class: JobAnalysisState
table: job_analysis_state
fields:
  jobInfoId: int
  jobInfo: JobInfo?, relation(name=job_info_analysis_state, field=jobInfoId)
  score: JobScore?, relation(name=job_analysis_state_score)
  proposal: JobProposal?, relation(name=job_analysis_state_proposal)
  createdJobInfoAt: DateTime
  createdJobScoringAt: DateTime?
  createdJobAiResponsesAt: DateTime?
indexes:
  job_analysis_state_job_info_unique_idx:
    fields: jobInfoId
    unique: true
  job_analysis_state_created_job_info_at_idx:
    fields: createdJobInfoAt
  job_analysis_state_created_job_scoring_at_idx:
    fields: createdJobScoringAt
  job_analysis_state_created_job_ai_responses_at_idx:
    fields: createdJobAiResponsesAt
