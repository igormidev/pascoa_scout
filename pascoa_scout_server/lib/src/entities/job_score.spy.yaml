class: JobScore
table: job_score
fields:
  jobAnalysisStateId: int
  jobAnalysisState: JobAnalysisState?, relation(name=job_analysis_state_score, field=jobAnalysisStateId)
  scorePercentage: int
  aiScoreJustificationText: String
indexes:
  job_score_job_analysis_state_unique_idx:
    fields: jobAnalysisStateId
    unique: true
  job_score_score_percentage_idx:
    fields: scorePercentage
