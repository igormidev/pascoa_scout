class: JobProposal
table: job_proposal
fields:
  jobAnalysisStateId: int
  jobAnalysisState: JobAnalysisState?, relation(name=job_analysis_state_proposal, field=jobAnalysisStateId)
  aiGeneratedCoverLetterText: String
  answers: List<JobProposalAnswerToQuestion>?, relation(name=job_proposal_answers)
indexes:
  job_proposal_job_analysis_state_unique_idx:
    fields: jobAnalysisStateId
    unique: true
